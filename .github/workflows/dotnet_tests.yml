name: .NET Tests

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    # GITHUB_TOKEN に read:packages 権限を付与
    permissions:
      contents: read
      packages: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '9.0.x'

    - name: Add GitHub Packages source with credentials
      run: |
        dotnet nuget remove source github || true
        dotnet nuget add source https://nuget.pkg.github.com/EcAuth/index.json \
          --name github \
          --username ${{ github.actor }} \
          --password ${{ secrets.ORG_PAT || secrets.PACKAGES_READ_TOKEN }} \
          --store-password-in-clear-text

    - name: Restore .NET tools
      run: dotnet tool restore

    - name: Restore dependencies
      run: dotnet restore ./EcAuth.sln

    - name: Build
      working-directory: ./IdentityProvider.Test
      run: dotnet build --no-restore

    - name: Test
      working-directory: ./IdentityProvider.Test
      run: dotnet test --no-build --verbosity normal

  verify-idempotent-script:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    env:
      DB_PASSWORD: "<YourStrong@Passw0rd>"
      DB_NAME: "EcAuthTest"

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          SA_PASSWORD: "<YourStrong@Passw0rd>"
          ACCEPT_EULA: "Y"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "exit 0"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '9.0.x'

    - name: Add GitHub Packages source with credentials
      run: |
        dotnet nuget remove source github || true
        dotnet nuget add source https://nuget.pkg.github.com/EcAuth/index.json \
          --name github \
          --username ${{ github.actor }} \
          --password ${{ secrets.ORG_PAT || secrets.PACKAGES_READ_TOKEN }} \
          --store-password-in-clear-text

    - name: Restore .NET tools
      run: dotnet tool restore

    - name: Restore dependencies
      run: dotnet restore IdentityProvider/IdentityProvider.csproj

    - name: Build
      run: dotnet build IdentityProvider/IdentityProvider.csproj --no-restore

    - name: Create test database
      run: |
        sqlcmd -S localhost -U SA -P "${DB_PASSWORD}" -C -b -Q \
          "CREATE DATABASE [${DB_NAME}];"

    - name: Generate idempotent migration script
      working-directory: IdentityProvider
      run: |
        dotnet ef migrations script --idempotent --output ../migration.sql
        echo "Generated idempotent migration script ($(wc -l < ../migration.sql) lines)"

    - name: Verify idempotent migration script
      run: |
        sqlcmd -S localhost -d "${DB_NAME}" -U SA -P "${DB_PASSWORD}" -C -b -i migration.sql
        echo "Idempotent migration script executed successfully"

    - name: Verify idempotent script is re-runnable
      run: |
        sqlcmd -S localhost -d "${DB_NAME}" -U SA -P "${DB_PASSWORD}" -C -b -i migration.sql
        echo "Idempotent migration script re-execution succeeded (idempotency verified)"

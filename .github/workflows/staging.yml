name: Staging Deploy & Migrate

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - migrate-and-deploy
          - deploy-only
          - migrate-only
        default: 'migrate-and-deploy'
      dry_run:
        description: 'Dry run (generate migration script only, skip deploy and verify)'
        required: false
        type: boolean
        default: false

env:
  DOTNET_VERSION: '9.0.x'
  AZURE_WEBAPP_PACKAGE_PATH: ./publish

jobs:
  migrate:
    if: contains(fromJSON('["migrate-only", "migrate-and-deploy"]'), inputs.action || 'migrate-and-deploy')
    runs-on: ubuntu-latest
    environment:
      name: staging

    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load secrets from 1Password
        id: load_secrets
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN_NONPROD }}
          # Azure SQL Database credentials
          SQL_HOST: op://EcAuth/ecauth-staging-sql/hostname
          SQL_DATABASE: op://EcAuth/ecauth-staging-sql/database
          SQL_USERNAME: op://EcAuth/ecauth-staging-sql/username
          SQL_PASSWORD: op://EcAuth/ecauth-staging-sql/password
          # Staging Organization/Client settings (for migration data)
          STAGING_ORGANIZATION_CODE: op://EcAuth/ecauth-staging-app/organization_code
          STAGING_ORGANIZATION_NAME: op://EcAuth/ecauth-staging-app/organization_name
          STAGING_ORGANIZATION_TENANT_NAME: op://EcAuth/ecauth-staging-app/organization_tenant_name
          STAGING_CLIENT_ID: op://EcAuth/ecauth-staging-app/client_id
          STAGING_CLIENT_SECRET: op://EcAuth/ecauth-staging-app/client_secret
          STAGING_APP_NAME: op://EcAuth/ecauth-staging-app/app_name
          STAGING_REDIRECT_URI: op://EcAuth/ecauth-staging-app/redirect_uri
          # Staging MockIdP settings
          STAGING_MOCK_IDP_APP_NAME: op://EcAuth/ecauth-staging-mockidp/app_name
          STAGING_MOCK_IDP_CLIENT_ID: op://EcAuth/ecauth-staging-mockidp/client_id
          STAGING_MOCK_IDP_CLIENT_SECRET: op://EcAuth/ecauth-staging-mockidp/client_secret
          MOCK_IDP_BASE_URL: op://EcAuth/mockidp-staging/base_url
          STAGING_MOCK_IDP_AUTHORIZATION_ENDPOINT: op://EcAuth/mockidp-staging/authorization_endpoint
          STAGING_MOCK_IDP_TOKEN_ENDPOINT: op://EcAuth/mockidp-staging/token_endpoint
          STAGING_MOCK_IDP_USERINFO_ENDPOINT: op://EcAuth/mockidp-staging/userinfo_endpoint
          # B2B Passkey settings
          STAGING_B2B_USER_SUBJECT: op://EcAuth/ecauth-staging-app/b2b_user_subject
          STAGING_B2B_USER_EXTERNAL_ID: op://EcAuth/ecauth-staging-app/b2b_user_external_id
          STAGING_B2B_REDIRECT_URI: op://EcAuth/ecauth-staging-app/b2b_redirect_uri
          STAGING_B2B_ALLOWED_RP_IDS: op://EcAuth/ecauth-staging-app/b2b_allowed_rp_ids

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Add GitHub Packages source with credentials
        run: |
          dotnet nuget remove source github || true
          dotnet nuget add source https://nuget.pkg.github.com/EcAuth/index.json \
            --name github \
            --username ${{ github.actor }} \
            --password ${{ secrets.ORG_PAT || secrets.PACKAGES_READ_TOKEN }} \
            --store-password-in-clear-text

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Restore dependencies
        run: dotnet restore IdentityProvider/IdentityProvider.csproj

      - name: Build
        run: dotnet build IdentityProvider/IdentityProvider.csproj --configuration Release --no-restore

      - name: Generate migration script
        run: |
          cd IdentityProvider
          dotnet ef migrations script --idempotent --output ../migration.sql
          echo "Generated migration script:"
          cat ../migration.sql

      - name: Upload migration script as artifact
        uses: actions/upload-artifact@v7
        with:
          name: migration-script
          path: migration.sql
          retention-days: 30

      - name: Build connection string
        id: connection
        run: |
          CONNECTION_STRING="Server=tcp:${SQL_HOST},1433;Initial Catalog=${SQL_DATABASE};User ID=${SQL_USERNAME};Password=${SQL_PASSWORD};Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;"
          echo "::add-mask::${CONNECTION_STRING}"
          echo "connection_string=${CONNECTION_STRING}" >> $GITHUB_OUTPUT

      # push イベント時は inputs.dry_run が undefined になるため || false でフォールバック
      - name: Login to Azure
        if: ${{ (inputs.dry_run || false) != true }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Apply migration to staging database
        if: ${{ (inputs.dry_run || false) != true }}
        uses: azure/sql-action@v2.3
        with:
          connection-string: ${{ steps.connection.outputs.connection_string }}
          path: ./migration.sql

      - name: Dry run - Skip migration apply
        if: ${{ (inputs.dry_run || false) == true }}
        run: |
          echo "Dry run mode enabled. Migration script was generated but not applied."
          echo "Review the migration script artifact before running without dry_run."

  build:
    if: contains(fromJSON('["deploy-only", "migrate-and-deploy"]'), inputs.action || 'migrate-and-deploy')
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Add GitHub Packages source with credentials
        run: |
          dotnet nuget remove source github || true
          dotnet nuget add source https://nuget.pkg.github.com/EcAuth/index.json \
            --name github \
            --username ${{ github.actor }} \
            --password ${{ secrets.ORG_PAT || secrets.PACKAGES_READ_TOKEN }} \
            --store-password-in-clear-text

      - name: Restore dependencies
        run: dotnet restore IdentityProvider/IdentityProvider.csproj

      - name: Build
        run: dotnet build IdentityProvider/IdentityProvider.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish IdentityProvider/IdentityProvider.csproj --configuration Release --no-build --output ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: webapp
          path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

  deploy:
    needs: [build, migrate]
    # push イベント時は inputs.dry_run が undefined になるため || false でフォールバック
    if: |
      always() &&
      (inputs.dry_run || false) != true &&
      needs.build.result == 'success' &&
      (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: staging

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: webapp
          path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ecauth-staging-${{ secrets.WEB_APP_SUFFIX }}
          package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}

      - name: Health check
        env:
          HEALTH_CHECK_URL: https://ecauth-staging-${{ secrets.WEB_APP_SUFFIX }}.azurewebsites.net/healthz
        run: |
          echo "Waiting for deployment to complete..."
          sleep 30
          for i in {1..10}; do
            response=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_CHECK_URL" || echo "000")
            if [ "$response" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i: Health check returned $response, retrying in 30 seconds..."
            sleep 30
          done
          echo "Health check failed after 10 attempts"
          exit 1

  verify:
    needs: deploy
    # push イベント時は inputs.dry_run が undefined になるため || false でフォールバック
    if: |
      always() &&
      needs.deploy.result == 'success' &&
      (inputs.dry_run || false) != true
    runs-on: ubuntu-latest
    environment:
      name: staging

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/scripts
            E2ETests

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN_NONPROD }}
          MOCK_USER: op://EcAuth/mockidp-staging/default_user_email
          MOCK_PASS: op://EcAuth/mockidp-staging/default_user_password
          CLIENT_ID: op://EcAuth/ecauth-staging-app/client_id
          CLIENT_SECRET: op://EcAuth/ecauth-staging-app/client_secret
          MOCK_IDP_PROVIDER_NAME: op://EcAuth/ecauth-staging-mockidp/app_name
          B2B_USER_SUBJECT: op://EcAuth/ecauth-staging-app/b2b_user_subject
          B2B_REDIRECT_URI: op://EcAuth/ecauth-staging-app/b2b_redirect_uri

      - name: Federation authentication verification
        id: federation_verify
        env:
          ECAUTH_BASE_URL: https://ecauth-staging-${{ secrets.WEB_APP_SUFFIX }}.azurewebsites.net
        run: ./.github/scripts/verify-federation-auth.sh

      - name: Federation verification result
        if: always()
        run: |
          echo "Federation verification result: ${{ steps.federation_verify.outputs.result }}"
          if [ "${{ steps.federation_verify.outputs.result }}" = "success" ]; then
            echo "✅ User subject: ${{ steps.federation_verify.outputs.user_sub }}"
          else
            echo "❌ Failed at step: ${{ steps.federation_verify.outputs.failed_step }}"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Playwright
        working-directory: E2ETests
        run: |
          yarn install --frozen-lockfile
          yarn playwright install --with-deps chromium

      - name: B2B passkey E2E verification
        id: b2b_verify
        working-directory: E2ETests
        env:
          E2E_BASE_URL: https://ecauth-staging-${{ secrets.WEB_APP_SUFFIX }}.azurewebsites.net
          DEFAULT_CLIENT_ID: ${{ env.CLIENT_ID }}
          DEFAULT_CLIENT_SECRET: ${{ env.CLIENT_SECRET }}
          DEV_B2B_ALLOWED_RP_IDS: ecauth-staging-${{ secrets.WEB_APP_SUFFIX }}.azurewebsites.net
          DEV_B2B_USER_SUBJECT: ${{ env.B2B_USER_SUBJECT }}
          DEV_B2B_REDIRECT_URI: ${{ env.B2B_REDIRECT_URI }}
        run: |
          set -o pipefail
          yarn playwright test tests/specs/b2b_passkey_authentication.spec.ts --reporter=list 2>&1 | tee playwright-output.txt

      - name: Upload E2E test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: b2b-e2e-test-results
          path: E2ETests/test-results/

      - name: B2B verification result
        if: always()
        run: |
          echo "### B2B Passkey E2E Verification" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.b2b_verify.outcome }}" = "success" ]; then
            echo "✅ B2B passkey E2E verification passed" | tee -a $GITHUB_STEP_SUMMARY
          else
            echo "❌ B2B passkey E2E verification failed" | tee -a $GITHUB_STEP_SUMMARY
          fi
          if [ -f E2ETests/playwright-output.txt ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat E2ETests/playwright-output.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo ""
            echo "--- Playwright Output ---"
            cat E2ETests/playwright-output.txt
          fi

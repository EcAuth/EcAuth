networks:
  backend:
    driver: bridge

volumes:
  sql1data:
    driver: local

services:
  identityprovider:
    image: ${DOCKER_REGISTRY-}identityprovider
    build:
      context: .
      dockerfile: IdentityProvider/Dockerfile
      target: final-with-https
      args:
        - GITHUB_USERNAME=${GITHUB_USERNAME}
        - GITHUB_TOKEN=${GITHUB_TOKEN}
    depends_on:
      - db
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      ASPNETCORE_HTTPS_PORTS: "8081"
      ASPNETCORE_Kestrel__Certificates__Default__Password: changeit
      ASPNETCORE_Kestrel__Certificates__Default__Path: /https/aspnetapp.pfx
      RUN_MIGRATIONS_ON_STARTUP: "true"
      ConnectionStrings__EcAuthDbContext: "Server=${DB_HOST};Database=${DB_NAME};User Id=${DB_USER};Password=${DB_PASSWORD};TrustServerCertificate=true;MultipleActiveResultSets=true"
      STATE_PASSWORD: ${STATE_PASSWORD:-strong_password_string_of_at_least_32_characters}
      GOOGLE_OAUTH2_APP_NAME: ${GOOGLE_OAUTH2_APP_NAME}
      GOOGLE_OAUTH2_CLIENT_ID: ${GOOGLE_OAUTH2_CLIENT_ID}
      GOOGLE_OAUTH2_CLIENT_SECRET: ${GOOGLE_OAUTH2_CLIENT_SECRET}
      GOOGLE_OAUTH2_DISCOVERY_URL: ${GOOGLE_OAUTH2_DISCOVERY_URL}
      AMAZON_OAUTH2_APP_NAME: ${AMAZON_OAUTH2_APP_NAME}
      AMAZON_OAUTH2_CLIENT_ID: ${AMAZON_OAUTH2_CLIENT_ID}
      AMAZON_OAUTH2_CLIENT_SECRET: ${AMAZON_OAUTH2_CLIENT_SECRET}
      AMAZON_OAUTH2_AUTHORIZATION_ENDPOINT: ${AMAZON_OAUTH2_AUTHORIZATION_ENDPOINT}
      AMAZON_OAUTH2_TOKEN_ENDPOINT: ${AMAZON_OAUTH2_TOKEN_ENDPOINT}
      AMAZON_OAUTH2_USERINFO_ENDPOINT: ${AMAZON_OAUTH2_USERINFO_ENDPOINT}
      FEDERATE_OAUTH2_APP_NAME: ${FEDERATE_OAUTH2_APP_NAME}
      FEDERATE_OAUTH2_CLIENT_ID: ${FEDERATE_OAUTH2_CLIENT_ID}
      FEDERATE_OAUTH2_CLIENT_SECRET: ${FEDERATE_OAUTH2_CLIENT_SECRET}
      FEDERATE_OAUTH2_AUTHORIZATION_ENDPOINT: ${FEDERATE_OAUTH2_AUTHORIZATION_ENDPOINT}
      FEDERATE_OAUTH2_TOKEN_ENDPOINT: ${FEDERATE_OAUTH2_TOKEN_ENDPOINT}
      FEDERATE_OAUTH2_USERINFO_ENDPOINT: ${FEDERATE_OAUTH2_USERINFO_ENDPOINT}
      DEFAULT_ORGANIZATION_CODE: ${DEFAULT_ORGANIZATION_CODE}
      DEFAULT_ORGANIZATION_NAME: ${DEFAULT_ORGANIZATION_NAME}
      DEFAULT_ORGANIZATION_TENANT_NAME: ${DEFAULT_ORGANIZATION_TENANT_NAME}
      DEFAULT_ORGANIZATION_REDIRECT_URI: ${DEFAULT_ORGANIZATION_REDIRECT_URI}
      DEFAULT_CLIENT_ID: ${DEFAULT_CLIENT_ID}
      DEFAULT_CLIENT_SECRET: ${DEFAULT_CLIENT_SECRET}
      DEFAULT_APP_NAME: ${DEFAULT_APP_NAME}
      # B2Bパスキーテスト用
      DEV_B2B_USER_SUBJECT: ${DEV_B2B_USER_SUBJECT}
      DEV_B2B_USER_EXTERNAL_ID: ${DEV_B2B_USER_EXTERNAL_ID}
      DEV_B2B_REDIRECT_URI: ${DEV_B2B_REDIRECT_URI}
      DEV_B2B_ALLOWED_RP_IDS: ${DEV_B2B_ALLOWED_RP_IDS}
      # E2Eテスト用の環境変数
      E2E_AUTHORIZATION_ENDPOINT: ${E2E_AUTHORIZATION_ENDPOINT}
      E2E_TOKEN_ENDPOINT: ${E2E_TOKEN_ENDPOINT}
      E2E_USERINFO_ENDPOINT: ${E2E_USERINFO_ENDPOINT}
      E2E_REDIRECT_URI: ${E2E_REDIRECT_URI}
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ${HOME}/.microsoft/usersecrets:/home/app/.microsoft/usersecrets:ro
    networks:
      - backend

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_PASSWORD}
    volumes:
      - sql1data:/var/opt/mssql
      - ./docker/db/backup:/var/opt/mssql/backup
    ports:
      - 1433:1433
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U ${DB_USER} -P '${DB_PASSWORD}' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      retries: 10
      start_period: 10s
      timeout: 3s
